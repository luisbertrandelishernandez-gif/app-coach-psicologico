# Workflow de despliegue automático a GitHub Pages
# Se ejecuta en cada push a la rama main
# Despliega todos los archivos estáticos (HTML, CSS, JS, JSON) directamente

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # Permite ejecución manual desde la pestaña Actions
  workflow_dispatch:

# Permisos necesarios para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Despliega todo el directorio raíz (es un sitio estático puro)
          path: '.'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
